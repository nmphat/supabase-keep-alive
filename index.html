<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supabase Keep-Alive</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #0f172a; color: #e2e8f0; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid #1e293b; }
        h1 { margin: 0; font-size: 24px; color: #38bdf8; }
        .meta { font-size: 14px; color: #94a3b8; display: flex; gap: 20px; }
        .btn { background: #0ea5e9; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 500; transition: background 0.2s; }
        .btn:hover { background: #38bdf8; }
        .btn.secondary { background: #334155; }
        .btn.secondary:hover { background: #475569; }
        .btn.danger { background: #ef4444; }
        .btn.danger:hover { background: #f87171; }
        .card { background: #1e293b; border-radius: 8px; padding: 20px; margin-bottom: 15px; border: 1px solid #334155; }
        .project-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .project-name { font-weight: 600; font-size: 18px; color: #f8fafc; }
        .status { padding: 4px 8px; border-radius: 12px; font-size: 12px; font-weight: 500; background: #1e293b; border: 1px solid #334155; }
        .status.ok { color: #4ade80; border-color: #22c55e; background: #052e16; }
        .status.error { color: #f87171; border-color: #ef4444; background: #450a0a; }
        .project-url { font-size: 14px; color: #94a3b8; margin-bottom: 8px; word-break: break-all; }
        .project-key { font-family: monospace; font-size: 13px; background: #0f172a; padding: 4px 8px; border-radius: 4px; display: inline-block; margin-bottom: 15px; color: #cbd5e1; }
        .actions { display: flex; gap: 10px; }
        .form-card { background: #1e293b; border-radius: 8px; padding: 20px; margin-bottom: 30px; border: 1px solid #334155; }
        .form-row { display: flex; gap: 15px; margin-bottom: 15px; flex-wrap: wrap; }
        input { background: #0f172a; border: 1px solid #334155; color: #e2e8f0; padding: 10px; border-radius: 6px; width: 100%; box-sizing: border-box; }
        input:focus { outline: none; border-color: #0ea5e9; }
        @media (max-width: 600px) {
            .form-row { flex-direction: column; }
            .meta { flex-direction: column; gap: 5px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🛡️ Supabase Keep-Alive</h1>
            <div class="meta">
                <span id="uptime">Uptime: calculating...</span>
                <span id="last-ping">Last run: never</span>
            </div>
        </header>

        <div style="margin-bottom: 30px;">
            <button class="btn" onclick="pingAll()">Ping All Projects</button>
        </div>

        <div class="form-card">
            <h2 style="margin-top: 0; margin-bottom: 15px; font-size: 18px;">Add Project</h2>
            <div class="form-row">
                <input type="text" id="new-name" placeholder="Project Name (lowercase, hyphens)">
                <input type="text" id="new-url" placeholder="Supabase URL (https://xxx.supabase.co)">
            </div>
            <div class="form-row">
                <input type="password" id="new-key" placeholder="Anon Key">
                <button class="btn" onclick="addProject()" style="width: auto; white-space: nowrap;">Add Project</button>
            </div>
        </div>

        <div id="projects-list"></div>
    </div>

    <script>
        const API = '';
        
        async function fetchJSON(url, opts = {}) {
            const res = await fetch(API + url, { ...opts, headers: { 'Content-Type': 'application/json', ...opts.headers } });
            return res.json();
        }

        async function loadProjects() {
            const health = await fetchJSON('/api/health');
            document.getElementById('uptime').textContent = `Uptime: ${formatTime(health.uptime)}`;
            document.getElementById('last-ping').textContent = `Last run: ${health.lastPing ? new Date(health.lastPing).toLocaleTimeString() : 'never'}`;

            const projects = await fetchJSON('/api/projects');
            const list = document.getElementById('projects-list');
            list.innerHTML = projects.map(p => `
                <div class="card" id="project-${p.name}">
                    <div class="project-header">
                        <span class="project-name">${p.name}</span>
                        <span class="status" id="status-${p.name}">Unknown</span>
                    </div>
                    <div class="project-url">${p.url}</div>
                    <div class="project-key">${p.key}</div>
                    <div class="actions">
                        <button class="btn secondary" onclick="pingProject('${p.name}')">Ping</button>
                        <button class="btn secondary" onclick="editProject('${p.name}', '${p.url}')">Edit</button>
                        <button class="btn danger" onclick="deleteProject('${p.name}')">Remove</button>
                    </div>
                </div>
            `).join('');
        }

        async function addProject() {
            const name = document.getElementById('new-name').value.trim();
            const url = document.getElementById('new-url').value.trim();
            const key = document.getElementById('new-key').value.trim();

            if (!name || !url || !key) return alert('All fields required');
            
            await fetchJSON('/api/projects', {
                method: 'POST',
                body: JSON.stringify({ name, url, key })
            });
            
            document.getElementById('new-name').value = '';
            document.getElementById('new-url').value = '';
            document.getElementById('new-key').value = '';
            loadProjects();
        }

        async function deleteProject(name) {
            if (!confirm(`Delete ${name}?`)) return;
            await fetchJSON(`/api/projects/${name}`, { method: 'DELETE' });
            loadProjects();
        }

        async function pingProject(name) {
            const statusEl = document.getElementById(`status-${name}`);
            statusEl.textContent = 'Pinging...';
            statusEl.className = 'status';
            
            const res = await fetchJSON(`/api/ping/${name}`);
            statusEl.textContent = res.ok ? `${res.status} (${res.ms}ms)` : `Error: ${res.error || res.status}`;
            statusEl.className = `status ${res.ok ? 'ok' : 'error'}`;
        }

        async function pingAll() {
            const results = await fetchJSON('/api/ping-all');
            results.forEach(r => {
                const statusEl = document.getElementById(`status-${r.name}`);
                statusEl.textContent = r.ok ? `${r.status} (${r.ms}ms)` : `Error: ${r.error || r.status}`;
                statusEl.className = `status ${r.ok ? 'ok' : 'error'}`;
            });
        }

        async function editProject(name, currentUrl) {
            const newUrl = prompt('New URL:', currentUrl);
            if (!newUrl) return;
            const newKey = prompt('New Key (leave empty to keep current):');
            
            await fetchJSON(`/api/projects/${name}`, {
                method: 'PUT',
                body: JSON.stringify({ url: newUrl, ...(newKey ? { key: newKey } : {}) })
            });
            loadProjects();
        }

        function formatTime(seconds) {
            const d = Math.floor(seconds / 86400);
            const h = Math.floor((seconds % 86400) / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            return `${d > 0 ? d + 'd ' : ''}${h}h ${m}m`;
        }

        loadProjects();
    </script>
</body>
</html>
