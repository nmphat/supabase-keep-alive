<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Keep-Alive</title>
    <style>
        :root {
            --bg: #09090b; --surface: #18181b; --border: #27272a;
            --primary: #fafafa; --primary-fg: #18181b;
            --muted: #a1a1aa; --destructive: #ef4444;
            --ring: #d4d4d8; --radius: 6px;
        }
        [data-theme="light"] {
            --bg: #ffffff; --surface: #f4f4f5; --border: #e4e4e7;
            --primary: #18181b; --primary-fg: #fafafa;
            --muted: #71717a; --destructive: #ef4444;
            --ring: #a1a1aa;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--primary); font-size: 14px; line-height: 1.5; }
        .container { max-width: 720px; margin: 0 auto; padding: 24px 16px; }

        /* Header */
        header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 16px; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
        h1 { font-size: 18px; font-weight: 600; }
        .meta { display: flex; gap: 16px; font-size: 13px; color: var(--muted); }
        .logout-btn { background: none; border: 1px solid var(--border); color: var(--muted); padding: 4px 12px; border-radius: var(--radius); cursor: pointer; font-size: 13px; }
        .logout-btn:hover { color: var(--primary); border-color: var(--muted); }

        /* Buttons */
        .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; background: var(--primary); color: var(--primary-fg); border: none; padding: 8px 16px; border-radius: var(--radius); cursor: pointer; font-size: 14px; font-weight: 500; transition: opacity 0.15s; min-height: 36px; }
        .btn:hover { opacity: 0.9; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--primary); }
        .btn-outline:hover { background: var(--surface); }
        .btn-destructive { background: var(--destructive); color: white; }
        .btn-destructive:hover { opacity: 0.9; }
        .btn-ghost { background: transparent; border: none; color: var(--muted); padding: 4px 8px; }
        .btn-ghost:hover { color: var(--primary); }
        .btn-sm { min-height: 28px; padding: 4px 10px; font-size: 13px; }

        /* Card */
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .card-title { font-size: 15px; font-weight: 600; }
        .card-meta { font-size: 12px; color: var(--muted); font-family: monospace; }
        .card-actions { display: flex; gap: 6px; margin-top: 12px; }

        /* Status badge */
        .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 9999px; font-size: 12px; font-weight: 500; border: 1px solid var(--border); }
        .badge-ok { color: #22c55e; border-color: #22c55e; background: rgba(34,197,94,0.1); }
        .badge-error { color: var(--destructive); border-color: var(--destructive); background: rgba(239,68,68,0.1); }
        .badge-pending { color: var(--muted); }

        /* Form */
        .form-section { margin-bottom: 24px; }
        .form-section h3 { font-size: 15px; font-weight: 600; margin-bottom: 12px; }
        .form-row { display: flex; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
        .field { flex: 1; min-width: 120px; }
        .field label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 4px; }
        .field input, .field select { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--primary); padding: 8px 12px; border-radius: var(--radius); font-size: 14px; min-height: 36px; }
        .field input:focus, .field select:focus { outline: none; border-color: var(--ring); box-shadow: 0 0 0 2px rgba(212,212,216,0.2); }
        .field input::placeholder { color: var(--muted); opacity: 0.5; }
        .error-text { color: var(--destructive); font-size: 12px; margin-top: 4px; }
        .test-result { font-size: 13px; margin-top: 8px; padding: 8px; border-radius: var(--radius); }
        .test-ok { color: #22c55e; background: rgba(34,197,94,0.1); }
        .test-error { color: var(--destructive); background: rgba(239,68,68,0.1); }

        /* Login */
        #login-screen { display: flex; justify-content: center; align-items: center; min-height: 80vh; }
        .login-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 32px; width: 100%; max-width: 360px; }
        .login-card h2 { font-size: 18px; margin-bottom: 16px; text-align: center; }
        .login-card .field { margin-bottom: 12px; }
        .login-card .btn { width: 100%; }

        /* Edit mode */
        .edit-fields { margin: 12px 0; }
        .edit-fields .field { margin-bottom: 8px; }

        /* Empty state */
        .empty { text-align: center; padding: 32px; color: var(--muted); }

        /* Spinner */
        .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--muted); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.6s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Interval display */
        .interval-control { display: flex; align-items: center; gap: 8px; margin: 8px 0; font-size: 13px; color: var(--muted); }
        .interval-control input[type="number"] { background: var(--bg); border: 1px solid var(--border); color: var(--primary); padding: 2px 6px; border-radius: var(--radius); font-size: 13px; width: 56px; }
        .interval-control select { background: var(--bg); border: 1px solid var(--border); color: var(--primary); padding: 2px 6px; border-radius: var(--radius); font-size: 13px; cursor: pointer; }

        /* History */
        .history-toggle { cursor: pointer; color: var(--muted); font-size: 13px; user-select: none; }
        .history-toggle:hover { color: var(--primary); }
        .history-table { width: 100%; border-collapse: collapse; margin-top: 8px; font-size: 12px; }
        .history-table th { text-align: left; color: var(--muted); font-weight: 500; padding: 4px 8px; border-bottom: 1px solid var(--border); }
        .history-table td { padding: 4px 8px; border-bottom: 1px solid var(--border); font-family: monospace; }
        .history-table .ok { color: #22c55e; }
        .history-table .error { color: var(--destructive); }
        .history-hidden { display: none; }

        .hidden { display: none !important; }

        /* Interval badge */
        .interval-info { font-size: 13px; color: var(--muted); }

        @media (min-width: 640px) {
            .projects-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
            .projects-grid .card { margin-bottom: 0; }
        }
    </style>
</head>
<body>
    <!-- Login -->
    <div id="login-screen">
        <div class="login-card">
            <h2>Keep-Alive</h2>
            <div class="field">
                <label for="login-token">Token</label>
                <input type="password" id="login-token" placeholder="Enter auth token" onkeydown="if(event.key==='Enter')doLogin()">
            </div>
            <button class="btn" onclick="doLogin()">Login</button>
            <div class="error-text hidden" id="login-error">Invalid token</div>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" class="container hidden">
        <header>
            <h1>Keep-Alive</h1>
            <div style="display:flex;align-items:center;gap:16px;">
                <div class="meta">
                    <span id="uptime">-</span>
                    <span id="last-ping">-</span>
                    <span class="interval-info" id="interval">-</span>
                </div>
                <button class="logout-btn" onclick="doLogout()">Logout</button>
                <button class="btn-ghost" onclick="toggleTheme()" id="theme-btn" aria-label="Toggle theme" style="font-size:18px;cursor:pointer;padding:4px 8px;">◐</button>
            </div>
        </header>

        <div style="margin-bottom:20px;">
            <button class="btn btn-outline" onclick="pingAll()" id="ping-all-btn">Ping All</button>
        </div>

        <!-- Add Project -->
        <div class="form-section">
            <h3>Add Project</h3>
            <div class="form-row">
                <div class="field">
                    <label for="tmpl-select">Template</label>
                    <select id="tmpl-select" onchange="renderFields()"></select>
                </div>
                <div class="field">
                    <label for="new-name">Name</label>
                    <input type="text" id="new-name" placeholder="my-project">
                </div>
            </div>
            <div class="form-row" id="dynamic-fields"></div>
            <div class="form-row">
                <button class="btn btn-outline btn-sm" onclick="testProject()" id="test-btn">Test</button>
                <button class="btn btn-sm" onclick="addProject()" id="add-btn">Add</button>
                <div id="test-result"></div>
            </div>
        </div>

        <!-- Projects -->
        <div class="form-section">
            <h3>Projects <span id="project-count" style="color:var(--muted);font-weight:400;"></span></h3>
            <div id="projects-list"></div>
        </div>
    </div>

    <script>
        const API = '';
        let TOKEN = localStorage.getItem('auth_token') || '';
        let templates = [];
        let editingName = null;

        // === Theme ===
        function initTheme() {
            const saved = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const theme = saved || (prefersDark ? 'dark' : 'light');
            document.documentElement.setAttribute('data-theme', theme);
        }
        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme') || 'dark';
            const next = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
        }
        initTheme();

        // === Auth ===
        function initToken() {
            const params = new URLSearchParams(window.location.search);
            const t = params.get('token');
            if (t) {
                TOKEN = t;
                localStorage.setItem('auth_token', t);
                history.replaceState(null, '', window.location.pathname);
            }
        }

        async function checkAuth() {
            initToken();
            if (!TOKEN) { show('login-screen'); hide('dashboard'); return; }
            try {
                const r = await api('/api/projects');
                if (r === 401 || !Array.isArray(r)) { show('login-screen'); hide('dashboard'); return; }
                hide('login-screen'); show('dashboard');
                loadTemplates(); loadProjects();
            } catch { show('login-screen'); hide('dashboard'); }
        }
        function show(id) { document.getElementById(id).classList.remove('hidden'); }
        function hide(id) { document.getElementById(id).classList.add('hidden'); }

        async function doLogin() {
            const t = document.getElementById('login-token').value.trim();
            if (!t) return;
            TOKEN = t; localStorage.setItem('auth_token', t);
            const r = await api('/api/projects');
            if (r === 401) { document.getElementById('login-error').classList.remove('hidden'); TOKEN = ''; localStorage.removeItem('auth_token'); return; }
            document.getElementById('login-error').classList.add('hidden');
            hide('login-screen'); show('dashboard');
            loadTemplates(); loadProjects();
        }
        function doLogout() { TOKEN = ''; localStorage.removeItem('auth_token'); show('login-screen'); hide('dashboard'); }

        // === API ===
        async function api(url, opts = {}) {
            const h = { 'Content-Type': 'application/json' };
            if (TOKEN) h['Authorization'] = `Bearer ${TOKEN}`;
            const r = await fetch(API + url, { ...opts, headers: { ...h, ...opts.headers } });
            if (r.status === 401) return 401;
            return r.json();
        }

        // === Templates ===
        async function loadTemplates() {
            templates = await api('/api/templates');
            const s = document.getElementById('tmpl-select');
            s.innerHTML = templates.map(t => `<option value="${t.id}">${t.icon} ${t.name}</option>`).join('');
            renderFields();
        }
        function renderFields() {
            const t = templates.find(x => x.id === document.getElementById('tmpl-select').value);
            if (!t) return;
            document.getElementById('dynamic-fields').innerHTML = t.fields.map(f =>
                `<div class="field"><label for="f-${f.key}">${f.label}</label><input type="${f.secret?'password':'text'}" id="f-${f.key}" placeholder="${f.placeholder||''}"></div>`
            ).join('');
        }
        function getFields() {
            const t = templates.find(x => x.id === document.getElementById('tmpl-select').value);
            if (!t) return {};
            const f = {};
            t.fields.forEach(x => { const el = document.getElementById(`f-${x.key}`); if (el) f[x.key] = el.value.trim(); });
            return f;
        }

        // === Test ===
        async function testProject() {
            const btn = document.getElementById('test-btn');
            const res = document.getElementById('test-result');
            const template = document.getElementById('tmpl-select').value;
            const fields = getFields();
            btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>'; res.innerHTML = '';
            const r = await api('/api/test', { method: 'POST', body: JSON.stringify({ template, fields }) });
            btn.disabled = false; btn.textContent = 'Test';
            if (r === 401) { res.innerHTML = '<span class="test-error">Unauthorized</span>'; return; }
            res.innerHTML = r.ok
                ? `<span class="test-ok">OK ${r.status} (${r.ms}ms)</span>`
                : `<span class="test-error">Fail: ${r.error || r.status} (${r.ms || 0}ms)</span>`;
        }

        // === Add ===
        async function addProject() {
            const name = document.getElementById('new-name').value.trim();
            const template = document.getElementById('tmpl-select').value;
            const fields = getFields();
            if (!name) return alert('Name required');
            const t = templates.find(x => x.id === template);
            for (const f of t.fields) { if (f.required && !fields[f.key]) return alert(`Missing: ${f.label}`); }
            const r = await api('/api/projects', { method: 'POST', body: JSON.stringify({ name, template, fields }) });
            if (r.error) return alert(r.error);
            document.getElementById('new-name').value = '';
            t.fields.forEach(f => { const el = document.getElementById(`f-${f.key}`); if (el) el.value = ''; });
            document.getElementById('test-result').innerHTML = '';
            loadProjects();
        }

        // === Projects ===
        async function loadProjects() {
            const h = await api('/api/health');
            if (h === 401) return;
            document.getElementById('uptime').textContent = `Up ${fmtTime(h.uptime)}`;
            document.getElementById('last-ping').textContent = h.lastPing ? new Date(h.lastPing).toLocaleTimeString() : 'never';
            document.getElementById('interval').textContent = `default ${formatInterval(h.defaultIntervalMinutes || 720)}`;

            const ps = await api('/api/projects');
            if (ps === 401) return;
            document.getElementById('project-count').textContent = `(${ps.length})`;
            const list = document.getElementById('projects-list');
            if (!ps.length) { list.innerHTML = '<div class="empty">No projects yet</div>'; return; }
            list.innerHTML = `<div class="projects-grid">${ps.map(p => renderCard(p)).join('')}</div>`;
        }

        function renderCard(p) {
            const t = templates.find(x => x.id === p.template);
            const ping = p.lastPing;
            const status = ping ? (ping.ok ? `<span class="badge badge-ok">${ping.status} ${ping.ms}ms</span>` : `<span class="badge badge-error">${ping.error||ping.status}</span>`) : '<span class="badge badge-pending">-</span>';
            const fields = Object.entries(p.fields).map(([k,v]) => `${escH(k)}: ${escH(v)}`).join(' · ');
            const histId = `hist-${p.name.replace(/[^a-zA-Z0-9]/g, '_')}`;

            // History table
            const hist = (p.pingHistory || []).slice().reverse();
            const historyHtml = hist.length > 0 ? `
                <span class="history-toggle" onclick="toggleHistory('${histId}')">History (${hist.length}) ▾</span>
                <div id="${histId}" class="history-hidden">
                    <table class="history-table">
                        <thead><tr><th>Time</th><th>Status</th><th>Response</th></tr></thead>
                        <tbody>${hist.map(h => `<tr>
                            <td>${new Date(h.time).toLocaleString()}</td>
                            <td class="${h.ok ? 'ok' : 'error'}">${h.ok ? `✓ ${h.status}` : `✗ ${escH(h.error||h.status)}`}</td>
                            <td>${h.ms}ms</td>
                        </tr>`).join('')}</tbody>
                    </table>
                </div>` : '';

            if (editingName === p.name) {
                const tmpl = templates.find(x => x.id === p.template);
                const editFields = tmpl.fields.map(f =>
                    `<div class="field"><label>${escH(f.label)}</label><input type="${f.secret?'password':'text'}" id="edit-${f.key}" value="${escH(p.fields[f.key]||'')}"></div>`
                ).join('');
                return `<div class="card">
                    <div class="card-header"><span class="card-title">${escH(p.name)}</span>${status}</div>
                    <div class="card-meta">${p.template} · ${fields}</div>
                    <div class="edit-fields">${editFields}</div>
                    <div class="card-actions">
                        <button class="btn btn-sm" onclick="saveEdit('${esc(p.name)}')">Save</button>
                        <button class="btn btn-outline btn-sm" onclick="cancelEdit()">Cancel</button>
                    </div>
                </div>`;
            }

            const intervalMin = p.intervalMinutes || 5;
            const { value, unit } = toValueUnit(intervalMin);
            const selId = `sel-${p.name.replace(/[^a-zA-Z0-9]/g, '_')}`;
            const numId = `num-${p.name.replace(/[^a-zA-Z0-9]/g, '_')}`;
            const sliderHtml = `<div class="interval-control"><span>Ping mỗi</span><input type="number" id="${numId}" value="${value}" min="1" onblur="commitInterval('${esc(p.name)}')"><select id="${selId}" onchange="commitInterval('${esc(p.name)}')"><option value="s"${unit==='s'?' selected':''}>giây</option><option value="m"${unit==='m'?' selected':''}>phút</option><option value="h"${unit==='h'?' selected':''}>giờ</option></select></div>`;

            return `<div class="card">
                <div class="card-header"><span class="card-title">${escH(p.name)}</span>${status}</div>
                <div class="card-meta">${p.template} · ${fields}</div>
                ${sliderHtml}
                ${historyHtml}
                <div class="card-actions">
                    <button class="btn-ghost btn-sm" onclick="pingOne('${esc(p.name)}')">Ping</button>
                    <button class="btn-ghost btn-sm" onclick="startEdit('${esc(p.name)}')">Edit</button>
                    <button class="btn-ghost btn-sm" style="color:var(--destructive)" onclick="deleteProject('${esc(p.name)}')">Remove</button>
                </div>
            </div>`;
        }

        function toggleHistory(id) {
            const el = document.getElementById(id);
            el.classList.toggle('history-hidden');
        }

        function formatInterval(minutes) {
            if (minutes < 1) return `${Math.round(minutes * 60)} giây`;
            if (minutes < 60) return `${Math.round(minutes)} phút`;
            const h = minutes / 60;
            return h % 1 === 0 ? `${h} giờ` : `${h.toFixed(1)} giờ`;
        }

        function toValueUnit(minutes) {
            if (minutes < 1) return { value: Math.round(minutes * 60), unit: 's' };
            if (minutes < 60) return { value: Math.round(minutes), unit: 'm' };
            if (minutes % 60 === 0) return { value: minutes / 60, unit: 'h' };
            return { value: Math.round(minutes), unit: 'm' };
        }

        function commitInterval(name) {
            const safe = name.replace(/[^a-zA-Z0-9]/g, '_');
            const v = Number(document.getElementById(`num-${safe}`).value);
            const u = document.getElementById(`sel-${safe}`).value;
            if (!v || v < 1) return loadProjects();
            const minutes = u === 's' ? v / 60 : u === 'h' ? v * 60 : v;
            if (minutes < 0.5 || minutes > 1440) return loadProjects();
            updateInterval(name, minutes);
        }

        function esc(s) { return s.replace(/\\/g, '\\\\').replace(/'/g, "\\'"); }
        function escH(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

        function startEdit(name) { editingName = name; loadProjects(); }
        function cancelEdit() { editingName = null; loadProjects(); }

        async function saveEdit(name) {
            const p = (await api('/api/projects')).find(x => x.name === name);
            if (!p) return;
            const tmpl = templates.find(x => x.id === p.template);
            const fields = {};
            tmpl.fields.forEach(f => { const el = document.getElementById(`edit-${f.key}`); if (el) fields[f.key] = el.value.trim(); });
            await api(`/api/projects/${encodeURIComponent(name)}`, { method: 'PUT', body: JSON.stringify({ fields }) });
            editingName = null;
            loadProjects();
        }

        async function deleteProject(name) {
            if (!confirm(`Delete "${name}"?`)) return;
            await api(`/api/projects/${encodeURIComponent(name)}`, { method: 'DELETE' });
            loadProjects();
        }

        async function pingOne(name) {
            await api(`/api/ping/${encodeURIComponent(name)}`);
            loadProjects();
        }

        async function updateInterval(name, minutes) {
            await api(`/api/projects/${encodeURIComponent(name)}`, { method: 'PUT', body: JSON.stringify({ intervalMinutes: minutes }) });
        }

        async function pingAll() {
            const btn = document.getElementById('ping-all-btn');
            btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>';
            await api('/api/ping-all');
            btn.disabled = false; btn.textContent = 'Ping All';
            loadProjects();
        }

        function fmtTime(s) {
            const d = Math.floor(s/86400), h = Math.floor((s%86400)/3600), m = Math.floor((s%3600)/60);
            return d > 0 ? `${d}d ${h}h` : `${h}h ${m}m`;
        }

        checkAuth();
    </script>
</body>
</html>
