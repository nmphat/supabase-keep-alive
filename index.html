<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keep-Alive</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Fira+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/nouislider@15.7.1/dist/nouislider.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/nouislider@15.7.1/dist/nouislider.min.js"></script>
    <style>
        :root {
            --bg: #020617; --surface: #0f172a; --surface-2: #1e293b;
            --border: #334155; --primary: #f8fafc; --primary-fg: #0f172a;
            --accent: #22c55e; --accent-dim: rgba(34,197,94,0.15);
            --muted: #94a3b8; --destructive: #ef4444;
            --ring: #3b82f6; --radius: 8px;
            --font-sans: 'Fira Sans', system-ui, sans-serif;
            --font-mono: 'Fira Code', 'Cascadia Code', monospace;
        }
        [data-theme="light"] {
            --bg: #f8fafc; --surface: #ffffff; --surface-2: #f1f5f9;
            --border: #e2e8f0; --primary: #0f172a; --primary-fg: #f8fafc;
            --muted: #64748b; --ring: #3b82f6;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: var(--font-sans); background: var(--bg); color: var(--primary); font-size: 14px; line-height: 1.6; -webkit-font-smoothing: antialiased; }
        .container { max-width: 780px; margin: 0 auto; padding: 32px 20px; }

        /* Header */
        header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 1px solid var(--border); margin-bottom: 28px; }
        h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.02em; }
        h1 span { color: var(--accent); }
        .meta { display: flex; gap: 16px; font-size: 13px; color: var(--muted); font-family: var(--font-mono); }
        .header-actions { display: flex; align-items: center; gap: 8px; }
        .icon-btn { background: none; border: 1px solid var(--border); color: var(--muted); width: 34px; height: 34px; border-radius: var(--radius); cursor: pointer; display: inline-flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .icon-btn:hover { color: var(--primary); border-color: var(--muted); background: var(--surface-2); }

        /* Buttons */
        .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; background: var(--accent); color: #fff; border: none; padding: 8px 18px; border-radius: var(--radius); cursor: pointer; font-size: 14px; font-weight: 500; font-family: var(--font-sans); transition: all 0.2s; min-height: 36px; }
        .btn:hover { filter: brightness(1.1); box-shadow: 0 0 20px var(--accent-dim); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; filter: none; box-shadow: none; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--primary); }
        .btn-outline:hover { background: var(--surface-2); border-color: var(--muted); box-shadow: none; filter: none; }
        .btn-ghost { background: transparent; border: none; color: var(--muted); padding: 4px 10px; cursor: pointer; font-family: var(--font-sans); transition: color 0.2s; }
        .btn-ghost:hover { color: var(--primary); }
        .btn-sm { min-height: 30px; padding: 4px 12px; font-size: 13px; }

        /* Card */
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; transition: border-color 0.2s, box-shadow 0.2s; }
        .card:hover { border-color: var(--muted); box-shadow: 0 0 0 1px var(--border); }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .card-title { font-size: 15px; font-weight: 600; }
        .card-meta { font-size: 12px; color: var(--muted); font-family: var(--font-mono); }
        .card-actions { display: flex; gap: 6px; margin-top: 12px; }

        /* Status badge */
        .badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 9999px; font-size: 12px; font-weight: 500; font-family: var(--font-mono); }
        .badge-ok { color: var(--accent); background: var(--accent-dim); }
        .badge-error { color: var(--destructive); background: rgba(239,68,68,0.12); }
        .badge-pending { color: var(--muted); background: var(--surface-2); }

        /* Form */
        .form-section { margin-bottom: 28px; }
        .form-section h3 { font-size: 15px; font-weight: 600; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
        .form-section h3 .count { color: var(--muted); font-weight: 400; font-size: 13px; }
        .form-row { display: flex; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
        .field { flex: 1; min-width: 120px; }
        .field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; }
        .field input, .field select { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--primary); padding: 8px 12px; border-radius: var(--radius); font-size: 14px; min-height: 36px; font-family: var(--font-sans); transition: border-color 0.2s, box-shadow 0.2s; }
        .field input:focus, .field select:focus { outline: none; border-color: var(--ring); box-shadow: 0 0 0 3px rgba(59,130,246,0.15); }
        .field input::placeholder { color: var(--muted); opacity: 0.5; }
        .error-text { color: var(--destructive); font-size: 12px; margin-top: 6px; }
        .test-result { font-size: 13px; margin-top: 8px; padding: 8px 12px; border-radius: var(--radius); font-family: var(--font-mono); }
        .test-ok { color: var(--accent); background: var(--accent-dim); }
        .test-error { color: var(--destructive); background: rgba(239,68,68,0.12); }

        /* Login */
        #login-screen { display: flex; justify-content: center; align-items: center; min-height: 80vh; }
        .login-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 36px; width: 100%; max-width: 380px; }
        .login-card h2 { font-size: 20px; margin-bottom: 8px; text-align: center; }
        .login-card p { text-align: center; color: var(--muted); font-size: 13px; margin-bottom: 20px; }
        .login-card .field { margin-bottom: 14px; }
        .login-card .btn { width: 100%; }

        /* Edit mode */
        .edit-fields { margin: 12px 0; }
        .edit-fields .field { margin-bottom: 8px; }

        /* Empty state */
        .empty { text-align: center; padding: 40px 20px; color: var(--muted); }
        .empty-icon { font-size: 32px; margin-bottom: 8px; opacity: 0.5; }

        /* Spinner */
        .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--muted); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* noUiSlider overrides */
        .interval-control { margin: 10px 0; }
        .interval-label { font-size: 13px; color: var(--muted); margin-bottom: 6px; }
        .interval-label strong { color: var(--accent); font-family: var(--font-mono); }
        .interval-marks { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); margin-top: 6px; padding: 0 2px; font-family: var(--font-mono); }
        .noUi-target { background: var(--surface-2); border: none; border-radius: var(--radius); height: 6px; box-shadow: none; }
        .noUi-connect { background: linear-gradient(90deg, var(--accent), #3b82f6); }
        .noUi-handle { width: 18px; height: 18px; right: -9px; top: -6px; background: var(--primary); border: 2px solid var(--accent); border-radius: 50%; box-shadow: 0 0 8px var(--accent-dim), 0 2px 4px rgba(0,0,0,0.3); cursor: grab; }
        .noUi-handle:active { cursor: grabbing; box-shadow: 0 0 12px var(--accent-dim), 0 2px 8px rgba(0,0,0,0.4); }
        .noUi-handle:before, .noUi-handle:after { display: none; }
        .noUi-tooltip { background: var(--surface); color: var(--accent); border: 1px solid var(--border); border-radius: var(--radius); font-size: 12px; padding: 2px 8px; font-family: var(--font-mono); font-weight: 500; }
        .noUi-pips { padding: 0; }
        .noUi-value { color: var(--muted); font-size: 11px; }
        .noUi-marker { background: var(--border); }
        .noUi-marker-large { background: var(--muted); height: 8px; }

        /* History */
        .history-toggle { cursor: pointer; color: var(--muted); font-size: 13px; user-select: none; transition: color 0.2s; }
        .history-toggle:hover { color: var(--accent); }
        .history-table { width: 100%; border-collapse: collapse; margin-top: 8px; font-size: 12px; }
        .history-table th { text-align: left; color: var(--muted); font-weight: 500; padding: 6px 8px; border-bottom: 1px solid var(--border); text-transform: uppercase; letter-spacing: 0.05em; font-size: 11px; }
        .history-table td { padding: 6px 8px; border-bottom: 1px solid var(--border); font-family: var(--font-mono); }
        .history-table .ok { color: var(--accent); }
        .history-table .error { color: var(--destructive); }
        .history-hidden { display: none; }

        .hidden { display: none !important; }
        .interval-info { font-size: 13px; color: var(--muted); }

        /* Responsive */
        @media (max-width: 639px) {
            .container { padding: 20px 16px; }
            header { flex-wrap: wrap; gap: 12px; }
            .meta { flex-wrap: wrap; gap: 8px; }
            .form-row { flex-direction: column; }
        }
        @media (min-width: 640px) {
            .projects-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
            .projects-grid .card { margin-bottom: 0; }
        }
    </style>
</head>
<body>
    <!-- Login -->
    <div id="login-screen">
        <div class="login-card">
            <h2>Keep-<span style="color:var(--accent)">Alive</span></h2>
            <p>Monitor your services</p>
            <div class="field">
                <label for="login-token">Token</label>
                <input type="password" id="login-token" placeholder="Enter auth token" onkeydown="if(event.key==='Enter')doLogin()">
            </div>
            <button class="btn" onclick="doLogin()">Login</button>
            <div class="error-text hidden" id="login-error">Invalid token</div>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" class="container hidden">
        <header>
            <h1>Keep-<span>Alive</span></h1>
            <div class="header-actions">
                <div class="meta">
                    <span id="uptime">-</span>
                    <span id="last-ping">-</span>
                    <span class="interval-info" id="interval">-</span>
                </div>
                <button class="icon-btn" onclick="doLogout()" aria-label="Logout" title="Logout">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                </button>
                <button class="icon-btn" onclick="toggleTheme()" id="theme-btn" aria-label="Toggle theme" title="Toggle theme">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                </button>
            </div>
        </header>

        <div style="margin-bottom:24px;">
            <button class="btn btn-outline" onclick="pingAll()" id="ping-all-btn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
                Ping All
            </button>
        </div>

        <!-- Add Project -->
        <div class="form-section">
            <h3>Add Project</h3>
            <div class="form-row">
                <div class="field">
                    <label for="tmpl-select">Template</label>
                    <select id="tmpl-select" onchange="renderFields()"></select>
                </div>
                <div class="field">
                    <label for="new-name">Name</label>
                    <input type="text" id="new-name" placeholder="my-project">
                </div>
            </div>
            <div class="form-row" id="dynamic-fields"></div>
            <div class="form-row" style="align-items:center;">
                <button class="btn btn-outline btn-sm" onclick="testProject()" id="test-btn">Test</button>
                <button class="btn btn-sm" onclick="addProject()" id="add-btn">Add</button>
                <div id="test-result"></div>
            </div>
        </div>

        <!-- Projects -->
        <div class="form-section">
            <h3>Projects <span class="count" id="project-count"></span></h3>
            <div id="projects-list"></div>
        </div>
    </div>

    <script>
        const API = '';
        let TOKEN = localStorage.getItem('auth_token') || '';
        let templates = [];
        let editingName = null;

        // === Theme ===
        function initTheme() {
            const saved = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const theme = saved || (prefersDark ? 'dark' : 'light');
            document.documentElement.setAttribute('data-theme', theme);
        }
        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme') || 'dark';
            const next = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
        }
        initTheme();

        // === Auth ===
        function initToken() {
            const params = new URLSearchParams(window.location.search);
            const t = params.get('token');
            if (t) {
                TOKEN = t;
                localStorage.setItem('auth_token', t);
                history.replaceState(null, '', window.location.pathname);
            }
        }

        async function checkAuth() {
            initToken();
            if (!TOKEN) { show('login-screen'); hide('dashboard'); return; }
            try {
                const r = await api('/api/projects');
                if (r === 401 || !Array.isArray(r)) { show('login-screen'); hide('dashboard'); return; }
                hide('login-screen'); show('dashboard');
                loadTemplates(); loadProjects();
            } catch { show('login-screen'); hide('dashboard'); }
        }
        function show(id) { document.getElementById(id).classList.remove('hidden'); }
        function hide(id) { document.getElementById(id).classList.add('hidden'); }

        async function doLogin() {
            const t = document.getElementById('login-token').value.trim();
            if (!t) return;
            TOKEN = t; localStorage.setItem('auth_token', t);
            const r = await api('/api/projects');
            if (r === 401) { document.getElementById('login-error').classList.remove('hidden'); TOKEN = ''; localStorage.removeItem('auth_token'); return; }
            document.getElementById('login-error').classList.add('hidden');
            hide('login-screen'); show('dashboard');
            loadTemplates(); loadProjects();
        }
        function doLogout() { TOKEN = ''; localStorage.removeItem('auth_token'); show('login-screen'); hide('dashboard'); }

        // === API ===
        async function api(url, opts = {}) {
            const h = { 'Content-Type': 'application/json' };
            if (TOKEN) h['Authorization'] = `Bearer ${TOKEN}`;
            const r = await fetch(API + url, { ...opts, headers: { ...h, ...opts.headers } });
            if (r.status === 401) return 401;
            return r.json();
        }

        // === Templates ===
        async function loadTemplates() {
            templates = await api('/api/templates');
            const s = document.getElementById('tmpl-select');
            s.innerHTML = templates.map(t => `<option value="${t.id}">${t.name}</option>`).join('');
            renderFields();
        }
        function renderFields() {
            const t = templates.find(x => x.id === document.getElementById('tmpl-select').value);
            if (!t) return;
            document.getElementById('dynamic-fields').innerHTML = t.fields.map(f =>
                `<div class="field"><label for="f-${f.key}">${f.label}</label><input type="${f.secret?'password':'text'}" id="f-${f.key}" placeholder="${f.placeholder||''}"></div>`
            ).join('');
        }
        function getFields() {
            const t = templates.find(x => x.id === document.getElementById('tmpl-select').value);
            if (!t) return {};
            const f = {};
            t.fields.forEach(x => { const el = document.getElementById(`f-${x.key}`); if (el) f[x.key] = el.value.trim(); });
            return f;
        }

        // === Test ===
        async function testProject() {
            const btn = document.getElementById('test-btn');
            const res = document.getElementById('test-result');
            const template = document.getElementById('tmpl-select').value;
            const fields = getFields();
            btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>'; res.innerHTML = '';
            const r = await api('/api/test', { method: 'POST', body: JSON.stringify({ template, fields }) });
            btn.disabled = false; btn.textContent = 'Test';
            if (r === 401) { res.innerHTML = '<span class="test-error">Unauthorized</span>'; return; }
            res.innerHTML = r.ok
                ? `<span class="test-ok">OK ${r.status} (${r.ms}ms)</span>`
                : `<span class="test-error">Fail: ${r.error || r.status} (${r.ms || 0}ms)</span>`;
        }

        // === Add ===
        async function addProject() {
            const name = document.getElementById('new-name').value.trim();
            const template = document.getElementById('tmpl-select').value;
            const fields = getFields();
            if (!name) return alert('Name required');
            const t = templates.find(x => x.id === template);
            for (const f of t.fields) { if (f.required && !fields[f.key]) return alert(`Missing: ${f.label}`); }
            const r = await api('/api/projects', { method: 'POST', body: JSON.stringify({ name, template, fields }) });
            if (r.error) return alert(r.error);
            document.getElementById('new-name').value = '';
            t.fields.forEach(f => { const el = document.getElementById(`f-${f.key}`); if (el) el.value = ''; });
            document.getElementById('test-result').innerHTML = '';
            loadProjects();
        }

        // === Projects ===
        async function loadProjects() {
            const h = await api('/api/health');
            if (h === 401) return;
            document.getElementById('uptime').textContent = `Up ${fmtTime(h.uptime)}`;
            document.getElementById('last-ping').textContent = h.lastPing ? new Date(h.lastPing).toLocaleTimeString() : 'never';
            document.getElementById('interval').textContent = `default ${formatInterval(h.defaultIntervalMinutes || 720)}`;

            const ps = await api('/api/projects');
            if (ps === 401) return;
            document.getElementById('project-count').textContent = `(${ps.length})`;
            const list = document.getElementById('projects-list');
            if (!ps.length) { list.innerHTML = '<div class="empty"><div class="empty-icon">◎</div>No projects yet</div>'; return; }
            list.innerHTML = `<div class="projects-grid">${ps.map(p => renderCard(p)).join('')}</div>`;
            initSliders();
        }

        function renderCard(p) {
            const t = templates.find(x => x.id === p.template);
            const ping = p.lastPing;
            const status = ping
                ? (ping.ok
                    ? `<span class="badge badge-ok"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>${ping.status} ${ping.ms}ms</span>`
                    : `<span class="badge badge-error"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>${ping.error||ping.status}</span>`)
                : '<span class="badge badge-pending">—</span>';
            const fields = Object.entries(p.fields).map(([k,v]) => `${escH(k)}: ${escH(v)}`).join(' · ');
            const histId = `hist-${p.name.replace(/[^a-zA-Z0-9]/g, '_')}`;

            const hist = (p.pingHistory || []).slice().reverse();
            const historyHtml = hist.length > 0 ? `
                <span class="history-toggle" onclick="toggleHistory('${histId}')">History (${hist.length}) ▾</span>
                <div id="${histId}" class="history-hidden">
                    <table class="history-table">
                        <thead><tr><th>Time</th><th>Status</th><th>Response</th></tr></thead>
                        <tbody>${hist.map(h => `<tr>
                            <td>${new Date(h.time).toLocaleString()}</td>
                            <td class="${h.ok ? 'ok' : 'error'}">${h.ok ? `✓ ${h.status}` : `✗ ${escH(h.error||h.status)}`}</td>
                            <td>${h.ms}ms</td>
                        </tr>`).join('')}</tbody>
                    </table>
                </div>` : '';

            if (editingName === p.name) {
                const tmpl = templates.find(x => x.id === p.template);
                const editFields = tmpl.fields.map(f =>
                    `<div class="field"><label>${escH(f.label)}</label><input type="${f.secret?'password':'text'}" id="edit-${f.key}" value="${escH(p.fields[f.key]||'')}"></div>`
                ).join('');
                return `<div class="card">
                    <div class="card-header"><span class="card-title">${escH(p.name)}</span>${status}</div>
                    <div class="card-meta">${p.template} · ${fields}</div>
                    <div class="edit-fields">${editFields}</div>
                    <div class="card-actions">
                        <button class="btn btn-sm" onclick="saveEdit('${esc(p.name)}')">Save</button>
                        <button class="btn btn-outline btn-sm" onclick="cancelEdit()">Cancel</button>
                    </div>
                </div>`;
            }

            const intervalMin = p.intervalMinutes || 5;
            const intervalLabel = formatInterval(intervalMin);
            const sliderId = `slider-${p.name.replace(/[^a-zA-Z0-9]/g, '_')}`;
            const valId = `interval-val-${p.name.replace(/[^a-zA-Z0-9]/g, '_')}`;
            const sliderHtml = `<div class="interval-control">
                <div class="interval-label">Monitor interval: <strong id="${valId}">${intervalLabel}</strong></div>
                <div id="${sliderId}" data-interval="${intervalMin}" data-name="${esc(p.name)}"></div>
                <div class="interval-marks"><span>30s</span><span>1m</span><span>5m</span><span>30m</span><span>1h</span><span>12h</span><span>24h</span></div>
            </div>`;

            return `<div class="card">
                <div class="card-header"><span class="card-title">${escH(p.name)}</span>${status}</div>
                <div class="card-meta">${p.template} · ${fields}</div>
                ${sliderHtml}
                ${historyHtml}
                <div class="card-actions">
                    <button class="btn-ghost btn-sm" onclick="pingOne('${esc(p.name)}')">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
                        Ping
                    </button>
                    <button class="btn-ghost btn-sm" onclick="startEdit('${esc(p.name)}')">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                        Edit
                    </button>
                    <button class="btn-ghost btn-sm" style="color:var(--destructive)" onclick="deleteProject('${esc(p.name)}')">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                        Remove
                    </button>
                </div>
            </div>`;
        }

        function toggleHistory(id) {
            document.getElementById(id).classList.toggle('history-hidden');
        }

        function formatInterval(minutes) {
            if (minutes < 1) return `${Math.round(minutes * 60)}s`;
            if (minutes < 60) return `${Math.round(minutes)}m`;
            const h = minutes / 60;
            return h % 1 === 0 ? `${h}h` : `${h.toFixed(1)}h`;
        }

        function initSliders() {
            document.querySelectorAll('.interval-control > div[id^="slider-"]').forEach(el => {
                if (el.noUiSlider) return;
                const current = Number(el.dataset.interval) || 5;
                const name = el.dataset.name;
                const valId = el.id.replace('slider-', 'interval-val-');
                noUiSlider.create(el, {
                    start: current,
                    snap: true,
                    connect: 'lower',
                    range: { 'min': 0.5, '14%': 1, '28%': 5, '42%': 30, '57%': 60, '71%': 720, 'max': 1440 },
                    tooltips: { to: formatInterval, from: Number },
                    pips: { mode: 'values', values: [0.5, 1, 5, 30, 60, 720, 1440], density: 5, format: { to: formatInterval, from: Number } }
                });
                el.noUiSlider.on('update', (values) => {
                    document.getElementById(valId).textContent = formatInterval(Number(values[0]));
                });
                el.noUiSlider.on('change', (values) => {
                    updateInterval(name, Number(values[0]));
                });
            });
        }

        function esc(s) { return s.replace(/\\/g, '\\\\').replace(/'/g, "\\'"); }
        function escH(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

        function startEdit(name) { editingName = name; loadProjects(); }
        function cancelEdit() { editingName = null; loadProjects(); }

        async function saveEdit(name) {
            const p = (await api('/api/projects')).find(x => x.name === name);
            if (!p) return;
            const tmpl = templates.find(x => x.id === p.template);
            const fields = {};
            tmpl.fields.forEach(f => { const el = document.getElementById(`edit-${f.key}`); if (el) fields[f.key] = el.value.trim(); });
            await api(`/api/projects/${encodeURIComponent(name)}`, { method: 'PUT', body: JSON.stringify({ fields }) });
            editingName = null;
            loadProjects();
        }

        async function deleteProject(name) {
            if (!confirm(`Delete "${name}"?`)) return;
            await api(`/api/projects/${encodeURIComponent(name)}`, { method: 'DELETE' });
            loadProjects();
        }

        async function pingOne(name) {
            await api(`/api/ping/${encodeURIComponent(name)}`);
            loadProjects();
        }

        async function updateInterval(name, minutes) {
            await api(`/api/projects/${encodeURIComponent(name)}`, { method: 'PUT', body: JSON.stringify({ intervalMinutes: minutes }) });
        }

        async function pingAll() {
            const btn = document.getElementById('ping-all-btn');
            btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>';
            await api('/api/ping-all');
            btn.disabled = false; btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg> Ping All';
            loadProjects();
        }

        function fmtTime(s) {
            const d = Math.floor(s/86400), h = Math.floor((s%86400)/3600), m = Math.floor((s%3600)/60);
            return d > 0 ? `${d}d ${h}h` : `${h}h ${m}m`;
        }

        checkAuth();
    </script>
</body>
</html>
