<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keep-Alive</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid #1e293b; }
        h1 { margin: 0; font-size: 24px; color: #38bdf8; }
        .meta { font-size: 14px; color: #94a3b8; display: flex; gap: 20px; }
        .btn { background: #0ea5e9; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 500; transition: background 0.2s; }
        .btn:hover { background: #38bdf8; }
        .btn.secondary { background: #334155; }
        .btn.secondary:hover { background: #475569; }
        .btn.danger { background: #ef4444; }
        .btn.danger:hover { background: #f87171; }
        .btn.sm { padding: 4px 10px; font-size: 13px; }
        .card { background: #1e293b; border-radius: 8px; padding: 20px; margin-bottom: 15px; border: 1px solid #334155; }
        .project-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .project-name { font-weight: 600; font-size: 18px; color: #f8fafc; }
        .project-template { font-size: 13px; color: #94a3b8; }
        .status { padding: 4px 8px; border-radius: 12px; font-size: 12px; font-weight: 500; background: #1e293b; border: 1px solid #334155; }
        .status.ok { color: #4ade80; border-color: #22c55e; background: #052e16; }
        .status.error { color: #f87171; border-color: #ef4444; background: #450a0a; }
        .project-fields { font-size: 13px; color: #94a3b8; margin-bottom: 12px; font-family: monospace; }
        .actions { display: flex; gap: 8px; }
        .form-card { background: #1e293b; border-radius: 8px; padding: 20px; margin-bottom: 30px; border: 1px solid #334155; }
        .form-row { display: flex; gap: 15px; margin-bottom: 12px; flex-wrap: wrap; }
        .form-row:last-child { margin-bottom: 0; }
        label { font-size: 13px; color: #94a3b8; display: block; margin-bottom: 4px; }
        input, select { background: #0f172a; border: 1px solid #334155; color: #e2e8f0; padding: 10px; border-radius: 6px; width: 100%; }
        input:focus, select:focus { outline: none; border-color: #0ea5e9; }
        select { cursor: pointer; }
        .field-group { flex: 1; min-width: 150px; }
        #login-screen { display: flex; justify-content: center; align-items: center; min-height: 60vh; }
        .login-card { background: #1e293b; border-radius: 12px; padding: 40px; width: 100%; max-width: 400px; text-align: center; border: 1px solid #334155; }
        .login-card h2 { margin: 0 0 20px; color: #38bdf8; }
        .login-card input { margin-bottom: 15px; text-align: center; }
        .error-msg { color: #f87171; font-size: 13px; margin-top: 8px; display: none; }
        .logout-btn { background: none; border: 1px solid #475569; color: #94a3b8; padding: 4px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; }
        .logout-btn:hover { border-color: #94a3b8; color: #e2e8f0; }
        .hidden { display: none !important; }
        @media (max-width: 600px) {
            .form-row { flex-direction: column; }
            .meta { flex-direction: column; gap: 5px; }
        }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div id="login-screen">
        <div class="login-card">
            <h2>🛡️ Keep-Alive</h2>
            <input type="password" id="login-token" placeholder="Enter auth token" onkeydown="if(event.key==='Enter')doLogin()">
            <button class="btn" onclick="doLogin()" style="width:100%">Login</button>
            <div class="error-msg" id="login-error">Invalid token</div>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" class="container hidden">
        <header>
            <h1>🛡️ Keep-Alive</h1>
            <div style="display:flex;align-items:center;gap:15px;">
                <div class="meta">
                    <span id="uptime">Uptime: ...</span>
                    <span id="last-ping">Last run: never</span>
                </div>
                <button class="logout-btn" id="logout-btn" onclick="doLogout()">Logout</button>
            </div>
        </header>

        <div style="margin-bottom: 25px;">
            <button class="btn" onclick="pingAll()">Ping All</button>
        </div>

        <div class="form-card">
            <h3 style="margin:0 0 15px;font-size:16px;">Add Project</h3>
            <div class="form-row">
                <div class="field-group">
                    <label>Template</label>
                    <select id="tmpl-select" onchange="renderFields()"></select>
                </div>
            </div>
            <div class="form-row">
                <div class="field-group">
                    <label>Name</label>
                    <input type="text" id="new-name" placeholder="my-project">
                </div>
                <div id="dynamic-fields"></div>
            </div>
            <div class="form-row" style="justify-content:flex-end;">
                <button class="btn" onclick="addProject()">Add</button>
            </div>
        </div>

        <div id="projects-list"></div>
    </div>

    <script>
        const API = '';
        let TOKEN = localStorage.getItem('auth_token') || '';
        let templates = [];

        // === Auth ===
        async function checkAuth() {
            if (!TOKEN) { showLogin(); return; }
            try {
                const res = await apiFetch('/api/projects');
                if (res === 401) { showLogin(); return; }
                showDashboard();
                loadProjects();
                loadTemplates();
            } catch { showLogin(); }
        }

        function showLogin() {
            document.getElementById('login-screen').classList.remove('hidden');
            document.getElementById('dashboard').classList.add('hidden');
        }

        function showDashboard() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
        }

        async function doLogin() {
            const token = document.getElementById('login-token').value.trim();
            if (!token) return;
            TOKEN = token;
            localStorage.setItem('auth_token', token);
            try {
                const res = await apiFetch('/api/projects');
                if (res === 401) {
                    document.getElementById('login-error').style.display = 'block';
                    TOKEN = '';
                    localStorage.removeItem('auth_token');
                    return;
                }
                document.getElementById('login-error').style.display = 'none';
                showDashboard();
                loadProjects();
                loadTemplates();
            } catch { document.getElementById('login-error').style.display = 'block'; }
        }

        function doLogout() {
            TOKEN = '';
            localStorage.removeItem('auth_token');
            showLogin();
        }

        // === API ===
        async function apiFetch(url, opts = {}) {
            const headers = { 'Content-Type': 'application/json' };
            if (TOKEN) headers['Authorization'] = `Bearer ${TOKEN}`;
            const res = await fetch(API + url, { ...opts, headers: { ...headers, ...opts.headers } });
            if (res.status === 401) return 401;
            return res.json();
        }

        // === Templates ===
        async function loadTemplates() {
            templates = await apiFetch('/api/templates');
            const sel = document.getElementById('tmpl-select');
            sel.innerHTML = templates.map(t => `<option value="${t.id}">${t.icon} ${t.name}</option>`).join('');
            renderFields();
        }

        function renderFields() {
            const tmplId = document.getElementById('tmpl-select').value;
            const tmpl = templates.find(t => t.id === tmplId);
            if (!tmpl) return;
            const container = document.getElementById('dynamic-fields');
            container.innerHTML = tmpl.fields.map(f =>
                `<div class="field-group">
                    <label>${f.label}</label>
                    <input type="${f.secret ? 'password' : 'text'}" id="field-${f.key}" placeholder="${f.placeholder || ''}">
                </div>`
            ).join('');
        }

        // === Projects ===
        async function loadProjects() {
            const health = await apiFetch('/api/health');
            if (health === 401) return;
            document.getElementById('uptime').textContent = `Uptime: ${fmtTime(health.uptime)}`;
            document.getElementById('last-ping').textContent = `Last: ${health.lastPing ? new Date(health.lastPing).toLocaleTimeString() : 'never'}`;

            const projects = await apiFetch('/api/projects');
            if (projects === 401) return;
            const list = document.getElementById('projects-list');
            if (!projects.length) {
                list.innerHTML = '<div class="card" style="text-align:center;color:#94a3b8;">No projects yet. Add one above.</div>';
                return;
            }
            list.innerHTML = projects.map(p => {
                const tmpl = templates.find(t => t.id === p.template);
                const icon = tmpl ? tmpl.icon : '🌐';
                const fieldStr = Object.entries(p.fields).map(([k, v]) => `${k}: ${v}`).join('  ');
                const ping = p.lastPing;
                const statusHtml = ping ? `<span class="status ${ping.ok ? 'ok' : 'error'}">${ping.ok ? `${ping.status} (${ping.ms}ms)` : `Error: ${ping.error || ping.status}`}</span>` : '<span class="status">-</span>';
                return `
                <div class="card">
                    <div class="project-header">
                        <span><span class="project-name">${icon} ${p.name}</span> <span class="project-template">(${p.template})</span></span>
                        ${statusHtml}
                    </div>
                    <div class="project-fields">${fieldStr}</div>
                    <div class="actions">
                        <button class="btn secondary sm" onclick="pingOne('${p.name}')">Ping</button>
                        <button class="btn danger sm" onclick="deleteProject('${p.name}')">Remove</button>
                    </div>
                </div>`;
            }).join('');
        }

        async function addProject() {
            const name = document.getElementById('new-name').value.trim();
            const template = document.getElementById('tmpl-select').value;
            const tmpl = templates.find(t => t.id === template);
            if (!name || !tmpl) return;

            const fields = {};
            for (const f of tmpl.fields) {
                const el = document.getElementById(`field-${f.key}`);
                if (el) fields[f.key] = el.value.trim();
                if (f.required && !fields[f.key]) return alert(`Missing: ${f.label}`);
            }

            const res = await apiFetch('/api/projects', { method: 'POST', body: JSON.stringify({ name, template, fields }) });
            if (res.error) return alert(res.error);
            document.getElementById('new-name').value = '';
            tmpl.fields.forEach(f => { const el = document.getElementById(`field-${f.key}`); if (el) el.value = ''; });
            loadProjects();
        }

        async function deleteProject(name) {
            if (!confirm(`Delete ${name}?`)) return;
            await apiFetch(`/api/projects/${name}`, { method: 'DELETE' });
            loadProjects();
        }

        async function pingOne(name) {
            await apiFetch(`/api/ping/${name}`);
            loadProjects();
        }

        async function pingAll() {
            await apiFetch('/api/ping-all');
            loadProjects();
        }

        function fmtTime(s) {
            const d = Math.floor(s / 86400), h = Math.floor((s % 86400) / 3600), m = Math.floor((s % 3600) / 60);
            return `${d > 0 ? d + 'd ' : ''}${h}h ${m}m`;
        }

        checkAuth();
    </script>
</body>
</html>
